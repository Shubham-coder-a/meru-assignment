<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestoFlow | Login</title>
  <meta name="description" content="Sign in to your RestoFlow restaurant accounting dashboard.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

  <!-- Dot-grid texture overlay -->
  <div class="login-bg-grid"></div>

  <div class="login-card fade-in">
    <div class="login-header">
      <!-- Animated brand icon -->
      <div class="login-icon-wrap">
        <div class="login-icon">
          <i class="fa-solid fa-utensils"></i>
        </div>
      </div>
      <h1 class="login-title">RestoFlow</h1>
      <p class="login-subtitle">Sign in to continue to your dashboard</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="usernameInput">Username</label>
        <div class="input-icon-wrapper">
          <i class="fa-regular fa-user"></i>
          <input
            type="text"
            id="usernameInput"
            class="form-control"
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 28px;">
        <label class="form-label" for="passwordInput">Password</label>
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="passwordInput"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <p id="loginError" class="login-error" style="display: none;">
        <i class="fa-solid fa-circle-exclamation"></i> Please fill in all fields.
      </p>

      <button type="submit" class="btn-primary login-btn">
        Sign In &nbsp;<i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <script>
    // Already logged in → skip to dashboard
    if (localStorage.getItem('rf_username')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const errorEl  = document.getElementById('loginError');

      if (!username || !password) {
        errorEl.style.display = 'flex';
        return;
      }

      localStorage.setItem('rf_username', username);
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
